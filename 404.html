<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Seite nicht gefunden | Michael Rusch</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'%3E%3Cpath fill='%23d97a3c' d='M0 14 C0 5, 5 0, 14 0 L30 0 C39 0, 44 5, 44 14 L44 30 C44 39, 39 44, 30 44 L14 44 C5 44, 0 39, 0 30 Z'/%3E%3Cpath fill='white' d='M 10 30 L 10 14 L 13 14 L 17 22 L 17 30 L 14 30 L 14 19 L 13 19 Z M 22 30 L 22 22 L 26 14 L 29 14 L 29 30 L 26 30 L 26 19 L 25 19 Z'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #1a1613;
    color: #f5ede0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
  }
  /* Subtle floating blob like main site */
  body::before {
    content: '';
    position: absolute;
    top: -120px; left: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #d97a3c;
    filter: blur(100px);
    opacity: 0.25;
    z-index: 0;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -120px; right: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #8b5cf6;
    filter: blur(100px);
    opacity: 0.18;
    z-index: 0;
  }
  .wrap {
    text-align: center;
    max-width: 540px;
    position: relative;
    z-index: 1;
  }
  .num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(120px, 25vw, 200px);
    font-weight: 700;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: #d97a3c;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 600;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }
  p {
    color: #b8a892;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 36px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 26px;
    border-radius: 999px;
    background: #d97a3c;
    color: #fff;
    text-decoration: none;
    font-weight: 500;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(217, 122, 60, 0.3);
  }
  .small {
    margin-top: 24px;
    font-size: 13px;
    color: #8a7a64;
  }
  .small a {
    color: #d97a3c;
    text-decoration: none;
    border-bottom: 1px solid rgba(217, 122, 60, 0.4);
  }
  .small a:hover { border-bottom-color: #d97a3c; }
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <h1 id="title">Seite nicht gefunden</h1>
  <p id="text">Die gesuchte Seite existiert nicht oder wurde verschoben. Vielleicht hat sich ein Tippfehler eingeschlichen?</p>
  <a href="/Portfolio/" class="btn" id="back">
    <span id="backText">Zurück zur Startseite</span>
    <span>→</span>
  </a>
  <p class="small">
    <span id="contact">Du suchst nach etwas Bestimmtem?</span>
    <a href="/Portfolio/#contact" id="contactLink">Schreib mir</a>
  </p>
</div>

<script>
  // Sprache aus localStorage übernehmen
  try {
    const lang = localStorage.getItem('lang') || 'de';
    if (lang === 'en') {
      document.documentElement.lang = 'en';
      document.title = '404 - Page not found | Michael Rusch';
      document.getElementById('title').textContent = 'Page not found';
      document.getElementById('text').textContent = "The page you're looking for doesn't exist or has been moved. Maybe a typo?";
      document.getElementById('backText').textContent = 'Back to homepage';
      document.getElementById('contact').textContent = 'Looking for something specific?';
      document.getElementById('contactLink').textContent = 'Write me';
    }
  } catch(e) {}
</script>
</body>
</html>
